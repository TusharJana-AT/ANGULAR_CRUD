<div>
    <form [formGroup]="editUserForm" (ngSubmit)="updateData()">
    <div class="form-group">
      <label>Name</label>
      <input type="text" formControlName="name" class="form-control" />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" formControlName="email" class="form-control" />
    </div>
   
    <div class="form-group">
      <label>Phone Number</label>
      <input type="text" formControlName="phone" class="form-control" />
    </div>
    <div class="form-group">
      <label>Age</label>
      <input type="number" formControlName="age" class="form-control" />
    </div>
    <div class="form-group">
      <label>Gender</label>

      <div class="radio-group">
        <input type="radio" value="Male" formControlName="gender" /> Male

        <input type="radio" value="Female" formControlName="gender" /> Female

        <input type="radio" value="Other" formControlName="gender" /> Other
      </div>
    </div>
    <div class="form-group">
      <label>Country</label>

      <select formControlName="country" class="form-control">
        <option value="">Select Country</option>
        <option value="India">India</option>
        <option value="USA">USA</option>
        <option value="Canada">Canada</option>
      </select>
    </div>
    <div class="form-group">
      <label>Address</label>

      <textarea rows="4" formControlName="address" class="form-control"> </textarea>    
    </div>
    <button (click)="updateData()">Add user</button>
    </form>
</div>
