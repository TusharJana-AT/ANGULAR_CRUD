<p>user-list works!</p>

<ul>
  @for (user of userData(); track user.id) {
    <div class="user-ul">
      <ul>
        <li>
          Name : {{ user.name }}
        </li>
        <li>
            Age : {{ user.age }}
        </li>
        <li>
            
          Email : {{ user.email }}
        </li>
        <li>
            
          ID : {{ user.id }}
        </li>
      </ul>

      <div>
        <button (click)="deleteUser(user.id)">Delete</button>
        <button (click)="editUser(user.id)">Edit</button>

      </div>
    </div>
  }
</ul>
